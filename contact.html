    <h1>Get in Touch!</h1>

    <p><strong>My availability is flexible!</strong> I would <em>love</em> to work with you!</p>

    <div id="user_info">
        <fieldset>
            <legend>Send me your information!</legend>

            <form>
                <div class="my-form">
                    <label for="name">Name: </label>
                    <input type="text" name="name" id="name" required /><br>

                    <label for="email">Email: </label>
                    <input type="email" name="email" id="email" required />
                </div>
            </form>

            <label for="message">Anything else you want me to know!</label><br>
            <textarea id="message" name="message" rows="5" cols="33"></textarea>

            <button popovertarget="my-dialog">Submit</button>

            <dialog id="my-dialog" popover>
                <p>Thank you! Hope to get in contact soon!</p>
                <button popovertarget="my-dialog" popovertargetaction="hide">Close</button>
            </dialog>
        </fieldset>
    </div>

</body>
