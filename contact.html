    <h1>Get in Touch!</h1>

    <div id="user_info">
        <fieldset>
            <legend>Send me your information!</legend>

            <label for="name">Name</label>
            <input
                type="text"
                id="name"
                name="name"/><br>

            <label for="name">Email</label>
            <input
                type="text"
                id="email"
                name="email"/><br>

            <label for="story">Anything else you want me to know!</label><br>
            <textarea id="message" name="story" rows="5" cols="33"></textarea>

            <button popovertarget="my-dialog">Submit</button>

            <dialog id="my-dialog" popover>
                <p>Thank you! Hope to get in contact soon!</p>
                <button popovertarget="my-dialog" popovertargetaction="hide">Close</button>
            </dialog>
        </fieldset>
    </div>
